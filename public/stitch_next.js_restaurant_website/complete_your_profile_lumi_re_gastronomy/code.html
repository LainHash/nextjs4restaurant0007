<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .glass-card {
            background: rgba(251, 249, 248, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(196, 199, 199, 0.4);
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #775a19;
            border-radius: 10px;
        }
    </style>

<body class="bg-background text-on-background font-body-md min-h-screen selection:bg-secondary-container">
<!-- Background Layer -->
<div class="fixed inset-0 z-[-1] overflow-hidden">
<div class="absolute inset-0 bg-black/30 z-[1]"></div>
<div class="w-full h-full scale-110 blur-sm" data-alt="A cinematic, high-end restaurant interior with warm, ambient lighting. In the background, out-of-focus soft golden bokeh from crystal chandeliers and candlelight illuminates tables set with fine white linens and gleaming glassware. The atmosphere is intimate, luxurious, and serene, captured with a shallow depth of field in a sophisticated editorial style." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCmhNU-Ag7TwDGEJivtFb3mWS3qE0WYFnHd7Bxa_Mh-DulxY2gm4GS2A7gpUsMbMUb4cbON_8w0rj8noM2O5Od_i8LFn9lhdh6saHYuCUGd-GGRHsRPrwCDm_NUesfRpxwqxrcIPECM0Vs8qioNjcUUyvwH5nVr17JZY0AsEUYs1eaO9-MVWX6-OZ3cuHPVqBIayFCqz5ryk1y_t5xSvnUkmGKFkIDeCS1gPZpXFL7y07D2NcX91Ei_MLMcUNE3frwJheKii66N_VI')">
</div>
</div>
<!-- Header / Top Bar (Simplified for Onboarding) -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-margin-desktop py-6">
<div class="font-headline-md text-headline-md text-white tracking-tighter">LUMIÈRE</div>
<div class="flex items-center gap-4">
<span class="font-label-md text-label-md text-white/70 uppercase tracking-widest">Step 2 of 2</span>
<div class="w-32 h-[2px] bg-white/20 rounded-full overflow-hidden">
<div class="h-full bg-secondary w-full transition-all duration-1000 ease-in-out"></div>
</div>
</div>
</header>
<main class="flex items-center justify-center min-h-screen px-margin-mobile pt-32 pb-12">
<div class="glass-card w-full max-w-xl rounded-lg p-10 md:p-12 shadow-2xl animate-in fade-in slide-in-from-bottom-8 duration-700">
<div class="mb-10">
<h1 class="font-headline-md text-headline-md text-primary mb-2">Refine Your Experience</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Tell us a bit more to ensure your visit to Lumière Gastronomy is perfectly tailored to your preferences.</p>
</div>
<form class="space-y-8" id="profile-form">
<!-- Phone & DOB Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-gutter">
<!-- Phone Number -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-primary block" for="phone">PHONE NUMBER</label>
<input class="w-full bg-transparent border-0 border-b border-outline focus:border-secondary focus:ring-0 px-0 py-3 font-body-md transition-colors placeholder:text-outline" id="phone" placeholder="+1 (555) 000-0000" type="tel"/>
</div>
<!-- Date of Birth -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-primary block" for="dob">DATE OF BIRTH <span class="text-on-surface-variant/50 font-normal">(OPTIONAL)</span></label>
<input class="w-full bg-transparent border-0 border-b border-outline focus:border-secondary focus:ring-0 px-0 py-3 font-body-md transition-colors text-on-surface-variant" id="dob" type="date"/>
</div>
</div>
<!-- Preferred Language -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-primary block" for="language">PREFERRED LANGUAGE</label>
<div class="relative">
<select class="w-full appearance-none bg-transparent border-0 border-b border-outline focus:border-secondary focus:ring-0 px-0 py-3 font-body-md transition-colors cursor-pointer pr-10" id="language">
<option value="en">English</option>
<option value="fr">Français</option>
<option value="it">Italiano</option>
<option value="es">Español</option>
<option value="ja">日本語</option>
</select>
<span class="material-symbols-outlined absolute right-0 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant">expand_more</span>
</div>
</div>
<!-- Dietary Preferences -->
<div class="space-y-4">
<label class="font-label-md text-label-md text-primary block">DIETARY PREFERENCES</label>
<div class="flex flex-wrap gap-3" id="dietary-tags">
<button class="px-4 py-2 rounded-full border border-outline-variant text-on-surface-variant hover:border-secondary hover:text-secondary transition-all font-label-md text-label-md flex items-center gap-2 group" onclick="toggleTag(this)" type="button">
                            Vegan <span class="material-symbols-outlined text-[18px] opacity-0 group-[.active]:opacity-100">check</span>
</button>
<button class="px-4 py-2 rounded-full border border-outline-variant text-on-surface-variant hover:border-secondary hover:text-secondary transition-all font-label-md text-label-md flex items-center gap-2 group" onclick="toggleTag(this)" type="button">
                            Vegetarian <span class="material-symbols-outlined text-[18px] opacity-0 group-[.active]:opacity-100">check</span>
</button>
<button class="px-4 py-2 rounded-full border border-outline-variant text-on-surface-variant hover:border-secondary hover:text-secondary transition-all font-label-md text-label-md flex items-center gap-2 group" onclick="toggleTag(this)" type="button">
                            Gluten-Free <span class="material-symbols-outlined text-[18px] opacity-0 group-[.active]:opacity-100">check</span>
</button>
<button class="px-4 py-2 rounded-full border border-outline-variant text-on-surface-variant hover:border-secondary hover:text-secondary transition-all font-label-md text-label-md flex items-center gap-2 group" onclick="toggleTag(this)" type="button">
                            Dairy-Free <span class="material-symbols-outlined text-[18px] opacity-0 group-[.active]:opacity-100">check</span>
</button>
<button class="px-4 py-2 rounded-full border border-outline-variant text-on-surface-variant hover:border-secondary hover:text-secondary transition-all font-label-md text-label-md flex items-center gap-2 group" onclick="toggleTag(this)" type="button">
                            Nut Allergy <span class="material-symbols-outlined text-[18px] opacity-0 group-[.active]:opacity-100">check</span>
</button>
</div>
<p class="text-label-sm text-on-surface-variant/60 italic">These preferences will be applied to all your future bookings.</p>
</div>
<!-- Actions -->
<div class="pt-8 flex flex-col md:flex-row items-center justify-between gap-6">
<button class="w-full md:w-auto px-8 py-4 font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors order-2 md:order-1" type="button">
                        Skip for now
                    </button>
<button class="w-full md:w-auto px-12 py-4 bg-primary text-white font-label-md text-label-md rounded-lg hover:bg-secondary hover:shadow-lg active:scale-[0.98] transition-all duration-300 ease-out order-1 md:order-2 flex items-center justify-center gap-3" type="submit">
                        Complete Profile
                        <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</div>
</form>
</div>
</main>
<!-- Simple Footer for Onboarding -->
<footer class="w-full py-8 px-margin-desktop text-center">
<p class="font-label-sm text-label-sm text-white/50">© 2024 Lumière Gastronomy. All rights reserved.</p>
</footer>
<script>
        function toggleTag(button) {
            const isActive = button.classList.contains('active');
            if (isActive) {
                button.classList.remove('active', 'border-secondary', 'bg-secondary/10', 'text-secondary');
                button.classList.add('border-outline-variant', 'text-on-surface-variant');
            } else {
                button.classList.add('active', 'border-secondary', 'bg-secondary/10', 'text-secondary');
                button.classList.remove('border-outline-variant', 'text-on-surface-variant');
            }
        }

        // Interactivity for the profile form
        document.getElementById('profile-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalContent = submitBtn.innerHTML;
            
            // Visual feedback
            submitBtn.disabled = true;
            submitBtn.innerHTML = `
                <span class="animate-spin material-symbols-outlined">progress_activity</span>
                Processing...
            `;
            
            setTimeout(() => {
                submitBtn.innerHTML = `
                    <span class="material-symbols-outlined">check_circle</span>
                    Welcome to Lumière
                `;
                submitBtn.classList.remove('bg-primary');
                submitBtn.classList.add('bg-secondary');
                
                // Real application would redirect here
                console.log('Profile completion success.');
            }, 1500);
        });

        // Floating label behavior for inputs could be added here
        const inputs = document.querySelectorAll('input, select');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.querySelector('label').style.color = '#775a19';
            });
            input.addEventListener('blur', () => {
                input.parentElement.querySelector('label').style.color = '';
            });
        });
    </script>
</body></html>
